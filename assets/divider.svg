<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 12" width="1200" height="12" role="presentation" aria-hidden="true">
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="0.5"  stop-color="#818cf8" stop-opacity="0.9"/>
      <stop offset="1"    stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="dot" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#818cf8"/>
    </radialGradient>
  </defs>
  <rect x="0" y="5" width="1200" height="2" rx="1" fill="url(#line)"/>
  <circle cx="600" cy="6" r="4" fill="url(#dot)">
    <animate attributeName="r" values="3;5;3" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.4s" repeatCount="indefinite"/>
  </circle>
</svg>
