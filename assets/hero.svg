<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="Armaan Punia, Software Engineer building backend, AI and cloud systems">
  <title>Armaan Punia, Software Engineer</title>
  <desc>Software Engineer focused on backend, AI and cloud. const focus = ['backend','ai','cloud'].</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="0.55" stop-color="#0f1420"/>
      <stop offset="1" stop-color="#10182a"/>
    </linearGradient>

    <linearGradient id="name" gradientUnits="userSpaceOnUse" x1="60" y1="0" x2="760" y2="0">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#22d3ee"/>
      <animate attributeName="x1" values="-200;60;-200" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="500;760;500" dur="8s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>

    <radialGradient id="glow" cx="0.3" cy="0.4" r="0.8">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.26"/>
      <stop offset="0.6" stop-color="#6366f1" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow2" cx="0.85" cy="0.75" r="0.7">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="320" rx="20" fill="url(#panel)"/>
  <rect width="1200" height="320" rx="20" fill="url(#glow)"/>
  <rect width="1200" height="320" rx="20" fill="url(#glow2)"/>
  <rect x="0.5" y="0.5" width="1199" height="319" rx="20" fill="none" stroke="#21262d" stroke-width="1"/>

  <!-- floating particles (SMIL animation, reliable in img-embedded SVG) -->
  <g>
    <circle cx="980"  cy="90"  r="2.5" fill="#818cf8" opacity="0.8"><animate attributeName="cy" values="90;80;90" dur="6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;1;0.5" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="1060" cy="150" r="1.8" fill="#22d3ee" opacity="0.8"><animate attributeName="cy" values="150;140;150" dur="7s" begin="1.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.4;1;0.4" dur="7s" begin="1.2s" repeatCount="indefinite"/></circle>
    <circle cx="1120" cy="90"  r="2.2" fill="#818cf8" opacity="0.8"><animate attributeName="cy" values="90;82;90" dur="5.5s" begin="0.6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;1;0.5" dur="5.5s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="900"  cy="200" r="1.6" fill="#22d3ee" opacity="0.7"><animate attributeName="cy" values="200;192;200" dur="6.5s" begin="1.8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.4;0.9;0.4" dur="6.5s" begin="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="1050" cy="240" r="2"   fill="#818cf8" opacity="0.7"><animate attributeName="cy" values="240;231;240" dur="7.5s" begin="2.4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.4;0.9;0.4" dur="7.5s" begin="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="1140" cy="210" r="1.5" fill="#a78bfa" opacity="0.7"><animate attributeName="cy" values="210;202;210" dur="6s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="820"  cy="110" r="1.4" fill="#22d3ee" opacity="0.6"><animate attributeName="cy" values="110;103;110" dur="6.8s" begin="1.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- eyebrow -->
  <circle cx="66" cy="76" r="4" fill="#22d3ee"/>
  <text x="80" y="81" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="16" letter-spacing="3" fill="#8b949e">SOFTWARE&#160;ENGINEER</text>

  <!-- name -->
  <text x="60" y="180" font-family="ui-sans-serif,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="88" font-weight="800" letter-spacing="-2" fill="url(#name)">Armaan Punia</text>

  <!-- accent rule: base width visible; SMIL draws it in -->
  <rect x="62" y="205" width="220" height="4" rx="2" fill="url(#rule)">
    <animate attributeName="width" values="0;220" dur="1s" begin="0.4s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1" keyTimes="0;1"/>
  </rect>

  <!-- tagline -->
  <text x="62" y="252" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="21" fill="#c9d1d9">
    <tspan fill="#6e7681">const focus = [ </tspan><tspan fill="#818cf8">'backend'</tspan><tspan fill="#6e7681">, </tspan><tspan fill="#a78bfa">'ai'</tspan><tspan fill="#6e7681">, </tspan><tspan fill="#22d3ee">'cloud'</tspan><tspan fill="#6e7681"> ]</tspan><tspan fill="#22d3ee" dx="6">▋<animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite" keyTimes="0;0.5;0.5;1"/></tspan>
  </text>
  <text x="62" y="288" font-family="ui-sans-serif,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="16" fill="#6e7681">Distributed systems · AI engineering · data at scale, shipped to production.</text>
</svg>
