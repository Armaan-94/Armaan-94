name: Generate contribution snake

# Builds the animated contribution-graph snake and pushes it to the `output` branch.
on:
  schedule:
    - cron: "0 */12 * * *"   # twice a day
  workflow_dispatch:          # allow manual runs
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake-dark.svg?palette=github-dark&color_snake=#818cf8&color_dots=#161b22,#1f3a5f,#3b5fa4,#818cf8,#22d3ee
            dist/snake-light.svg?palette=github-light&color_snake=#6366f1

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
