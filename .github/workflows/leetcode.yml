name: Update LeetCode card

# Refreshes assets/leetcode.svg from live LeetCode data once a day.
# No `push` trigger (avoids commit loops); runs on a schedule + on demand.
on:
  schedule:
    - cron: "17 3 * * *"   # daily, ~03:17 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: leetcode-card
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate LeetCode SVG
        run: python .github/scripts/leetcode_card.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- assets/leetcode.svg; then
            echo "No change in LeetCode card."
          else
            git add assets/leetcode.svg
            git commit -m "chore: refresh LeetCode stats [skip ci]"
            git push
          fi
